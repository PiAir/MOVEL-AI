name: Render en Webhook

on:
  push:
    branches: [ main ]

# Forceert het gebruik van Node 24 voor alle actions
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true    

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      # VOEG DIT TOE: Installeer R
      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'     

      # OPTIONEEL: Als je specifieke R-pakketten gebruikt, installeer ze hier
      - name: Installeer R-pakketten
        run: |
          Rscript -e "install.packages(c('rmarkdown', 'knitr', 'exams2forms'))"        

      - name: Installeer Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      # Stap 1: Injecteer de geheimen in xapi-logic.js
      - name: Inject Proxy Config
        run: |
          sed -i "s|PROXY_URL_PLACEHOLDER|${{ secrets.XAPI_PROXY_URL }}|g" xapi/xapi-logic.js
          sed -i "s|PROXY_KEY_PLACEHOLDER|${{ secrets.XAPI_PROXY_KEY }}|g" xapi/xapi-logic.js

      # Stap 2: Render en Publish met het productie-profiel
      - name: Publish naar GitHub Pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          QUARTO_PROFILE: production

      # 2. Roep je eigen server aan (de Webhook)
      - name: Trigger eigen server
        run: |
          curl -X POST https://cdn.lrn4life.org/webhook.php \
          -H "Authorization: Bearer ${{ secrets.WEBHOOK_TOKEN }}" \
          -H "Content-Type: application/json" \
          -A "GitHub-Actions-MyQuartoSite"