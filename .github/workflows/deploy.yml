name: Render en Webhook

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      # VOEG DIT TOE: Installeer R
      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      # OPTIONEEL: Als je specifieke R-pakketten gebruikt, installeer ze hier
      - name: Installeer R-pakketten
        run: |
          Rscript -e "install.packages(c('rmarkdown', 'knitr'))"        

      - name: Installeer Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      # 1. Render en publiceer naar GitHub Pages
      - name: Publish naar GitHub Pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 2. Roep je eigen server aan (de Webhook)
      - name: Trigger eigen server
        run: |
          curl -X POST https://cdn.lrn4life.org/webhook.php \
          -H "Authorization: Bearer ${{ secrets.WEBHOOK_TOKEN }}"
