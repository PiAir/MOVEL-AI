project:
  type: website
  output-dir: docs
  render: 
    - "*.qmd"
    - "!quiz/*"

format:
  html:
    link-external-newwindow: true
    link-external-icon: true  
    link-external-filter: '^(?:http:|https:)\/\/(cdn\.lrn4life\.org|leren\.han\.nl)\/'
    lightbox: auto
    toc: true
    theme:
      - cosmo
      - brand
    css: 
      - styles.css
      - webex.css
    include-after-body: webex.js     

